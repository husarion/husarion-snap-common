#
# Robot Info — minimal, standalone panel shipped INSIDE every Husarion snap.
# Read-only readouts the snap's own embedded husarion-agent can answer under
# strict confinement (see the confinement contract in 20-health.yaml).
#
# Snap-AGNOSTIC: every field comes from `snapctl get`, `$SNAP/meta/snap.yaml`,
# or a kernel file — nothing hardcodes the snap name, so the same YAML ships
# unchanged in rosbot / husarion-rplidar / husarion-depthai.

name: info
title: Robot Info
icon: hard-drive
description: Live snap + ROS readouts

live_reads:
  - id: snap_version
    title: Snap version
    description: Installed snap version (from meta/snap.yaml).
    exec:
      - /bin/sh
      - -c
      - "awk '/^version:/{print $2; exit}' \"$SNAP/meta/snap.yaml\""

  - id: robot_model
    title: Robot model
    description: driver.robot-model, when the snap defines one (n/a otherwise).
    exec:
      - /bin/sh
      - -c
      - 'm=$(snapctl get driver.robot-model 2>/dev/null || true); echo "${m:-(n/a)}"'

  - id: ros_distro
    title: ROS distro
    description: ROS 2 distribution baked into this snap.
    exec:
      - /bin/sh
      - -c
      - "awk '/ROS_DISTRO:/{print $2; exit}' \"$SNAP/meta/snap.yaml\""

  - id: ros_namespace
    title: ROS namespace
    description: ros.namespace this snap publishes under (default = none).
    exec:
      - /bin/sh
      - -c
      - 'n=$(snapctl get ros.namespace 2>/dev/null || true); echo "${n:-(none / default)}"'

  - id: ros_domain_id
    title: ROS domain ID
    description: ros.domain-id (DDS partition).
    exec:
      - /bin/sh
      - -c
      - 'd=$(snapctl get ros.domain-id 2>/dev/null || true); echo "${d:-0}"'

  - id: ros_transport
    title: ROS transport
    description: ros.transport selection (RMW + profile, e.g. fastdds/udp).
    exec:
      - /bin/sh
      - -c
      - 't=$(snapctl get ros.transport 2>/dev/null || true); echo "${t:-(unset)}"'

  - id: hostname
    title: Hostname
    description: Host's hostname.
    exec:
      - cat
      - /proc/sys/kernel/hostname
